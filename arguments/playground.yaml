dataset_name: playground

x_rotation: 0

fire_sim_root: output/playground/sim_output

is_render_360: False

# Initial tight bounding box for voxel extraction (before expansion)
extract_voxel:
  bbox_min: [-1.05, -0.81, -0.53]
  bbox_max: [1.1, 1.4, 0.38]
  scale_factor: 1.1
  voxel_size: 256

# Expanded bounding box (generated by extract_voxel.py)
bounding_box:
  min:
  - -1.190500020980835
  - -0.9205000400543213
  - -1.2904999256134033
  max:
  - 1.2404999732971191
  - 1.5104999542236328
  - 1.1405000686645508
voxel_grid:
  dims:
  - 256
  - 256
  - 256
  voxel_size: 0.009496093727648258

# Hierarchical part tree decomposition parameters
part_tree:
  current_scale: 0.9
  scale_step: 0.4
  min_scale: 0.1

scene: playground

T_white: 12000
T_max: 1440
T_air: 273
k: 0.3 # fuel decay rate
burn_rate: 0.045 # wood burn rate
beta: 200 # temperature transfer rate in wood
alpha: 50 # buoyancy force strength
epsilon: 5 # vorticity confinment strength
load_path: data/playground/voxel_grid.npy
load_path_indices_pts_in_grids: data/playground/indices_pts_in_grids.pth
load_path_mask_pts_in_grids: data/playground/mask_pts_in_grids.pth
sim_frames: 600
save_npz: True
save_vti: False

render_smoke: True
darkness: 1.0 # dark scale for origin scene
add_sepc_light: True
spec_intensity: 1e-9
render_single: False
render_frame: 170
render_camera: 61
near: 1
far: 10
num_samples_coarse: 128
num_samples_fine: 2048
sampling_smooth_factor: 0.7
sampling_chunk_size: 64  # 分块处理时的块大小，可根据显存调整

camera_params:
  radius: 3
  azimuth_start: 0 #260
  azimuth_end: 70
  elevation: 0
  x_offset: 0.0
  y_offset: 0.0
  z_offset: 0.4
  look_up_point: [0.0, -0.1, 0.0]