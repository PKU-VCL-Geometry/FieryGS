dataset_name: firewoods_sand_dark

x_rotation: 181

fire_sim_root: output/firewoods_sand_dark/sim_output

is_render_360: False
time_freez: False

# Initial tight bounding box for voxel extraction (before expansion)
extract_voxel:
  bbox_min: [-1.5, -1.5, -2.8]
  bbox_max: [0.9, 0.9, -1.0]
  scale_factor: 1.1
  voxel_size: 256

# Expanded bounding box (generated by extract_voxel.py)
bounding_box:
  min:
  - -1.6200001239776611
  - -1.6200001239776611
  - -3.2200000286102295
  max:
  - 1.0199999809265137
  - 1.0199999809265137
  - -0.5799999237060547
voxel_grid:
  dims:
  - 256
  - 256
  - 256
  voxel_size: 0.010312500409781933

scene: firewoods_sand_dark

T_white: 12000
T_max: 1440
T_air: 273
k: 0.3 # fuel decay rate
burn_rate: 0.0 # wood burn rate
beta: 50 # temperature transfer rate in wood
alpha: 120 # buoyancy force strength
epsilon: 5 # vorticity confinment strength
load_path: data/firewoods_sand_dark/voxel_grid.npy
load_path_indices_pts_in_grids: data/firewoods_sand_dark/indices_pts_in_grids.pth
load_path_mask_pts_in_grids: data/firewoods_sand_dark/mask_pts_in_grids.pth
sim_frames: 400
save_npz: True
save_vti: False

render_smoke: True
darkness: 1.0 # dark scale for origin scene
add_sepc_light: True
use_perturb: True
spec_intensity: 1e-7
render_single: False
render_frame: 399
render_camera: 0

camera_params:
  radius: 4.0
  azimuth_start: 140 #260
  azimuth_end: 400
  elevation: 0
  x_offset: 0.0
  y_offset: 0.0
  z_offset: -0.7
  look_up_point: [0.0, 0.5, -2.0]
