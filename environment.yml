name: fire_gaussian
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=11.8
  - tqdm
  - hdbscan
  - matplotlib
  - scikit-learn
  - imageio
  - imageio-ffmpeg
  - pip:
      - hydra-core>=1.3.2
      - iopath>=0.1.10
      - plyfile
      - dearpygui
      - opencv-python
      - open-clip-torch
      - open3d
      - openai
      - taichi
      - PyMCubes
      - noise  
      - vtk
      - third_party/segment-anything